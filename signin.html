<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In | Stackly SaaS Cloud Platform</title>
  <!-- Favicon -->
  <link rel="icon" type="image/webp" href="assets/top-logo.webp">
  <!-- Fonts & Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- Stylesheet -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Custom Cursor Markup -->
  <div class="custom-cursor-dot"></div>
  <div class="custom-cursor-ring"></div>

  <!-- Sign In Section -->
  <section class="auth-section" style="--page-hero-bg: url('https://images.unsplash.com/photo-1551288049-bebda4e38f71?auto=format&fit=crop&w=1920&q=80');">
    <div class="auth-card reveal zoom-in">
      <div class="auth-header">
        <a href="index.html" class="logo-container">
          <img src="assets/logo.webp" alt="Stackly Logo" class="logo-img">
        </a>
        <h2 class="auth-title">Welcome back</h2>
        <p class="auth-subtitle">Access your SaaS cloud control center</p>
      </div>

      <!-- Social Logins -->
      <div class="auth-social-btns">
        <a href="404.html" class="auth-social-btn">
          <i class="fab fa-google"></i> Google
        </a>
        <a href="404.html" class="auth-social-btn">
          <i class="fab fa-github"></i> GitHub
        </a>
      </div>

      <div class="auth-divider">or sign in with email</div>

      <!-- Sign In Form -->
      <form class="signin-form">
        <div class="form-group">
          <label class="form-label" for="email">Work Email</label>
          <input type="email" id="email" class="form-input" placeholder="name@company.com" required>
        </div>
        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <input type="password" id="password" class="form-input" placeholder="Enter Your Password" required>
        </div>

        <div class="auth-links">
          <label style="display: flex; align-items: center; gap: 8px; font-size: 0.85rem; color: var(--text-light);">
            <input type="checkbox" style="accent-color: var(--primary);"> Remember me
          </label>
          <a href="404.html" class="auth-link">Forgot password?</a>
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%; padding: 14px;">
          Sign In <i class="fas fa-arrow-right"></i>
        </button>
      </form>

      <div class="auth-footer">
        Don't have an account? <a href="getstarted.html">Get Started</a>
      </div>
    </div>
  </section>

  <!-- Script -->
  <script src="js/main.js"></script>
</body>
</html>
