<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Get Started | Stackly SaaS Cloud Platform</title>
  <!-- Favicon -->
  <link rel="icon" type="image/webp" href="assets/top-logo.webp">
  <!-- Fonts & Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- Stylesheet -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Custom Cursor Markup -->
  <div class="custom-cursor-dot"></div>
  <div class="custom-cursor-ring"></div>

  <!-- Get Started Section -->
  <section class="auth-section" style="--page-hero-bg: url('https://images.unsplash.com/photo-1544197150-b99a580bb7a8?auto=format&fit=crop&w=1920&q=80');">
    <div class="auth-card reveal zoom-in">
      <div class="auth-header">
        <a href="index.html" class="logo-container">
          <img src="assets/logo.webp" alt="Stackly Logo" class="logo-img">
        </a>
        <h2 class="auth-title">Provision Platform</h2>
        <p class="auth-subtitle">Deploy your dedicated cloud cluster in Salem, India</p>
      </div>

      <!-- Social Sign Ups -->
      <div class="auth-social-btns">
        <a href="404.html" class="auth-social-btn">
          <i class="fab fa-google"></i> Google
        </a>
        <a href="404.html" class="auth-social-btn">
          <i class="fab fa-github"></i> GitHub
        </a>
      </div>

      <div class="auth-divider">or create account with email</div>

      <!-- Get Started Form -->
      <form class="getstarted-form">
        <div class="form-group-row">
          <div class="form-group">
            <label class="form-label" for="fullname">Full Name</label>
            <input type="text" id="fullname" class="form-input" placeholder="Rajesh Kumar" required>
          </div>
          <div class="form-group">
            <label class="form-label" for="company">Company Name</label>
            <input type="text" id="company" class="form-input" placeholder="Stackly Labs" required>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="email">Work Email</label>
          <input type="email" id="email" class="form-input" placeholder="rajesh@stacklylabs.com" required>
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <input type="password" id="password" class="form-input" placeholder="Minimum 8 characters" required minlength="8">
        </div>

        <div style="font-size: 0.8rem; color: var(--text-light); text-align: left; margin-bottom: 24px;">
          By signing up, you agree to Stackly's <a href="404.html" class="auth-link">Terms of Service</a> and <a href="404.html" class="auth-link">Privacy Policy</a>.
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%; padding: 14px;">
          Provision Cluster <i class="fas fa-server"></i>
        </button>
      </form>

      <div class="auth-footer">
        Already have an account? <a href="signin.html">Sign In</a>
      </div>
    </div>
  </section>

  <!-- Script -->
  <script src="js/main.js"></script>
</body>
</html>
