<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="x-ua-compatible" content="ie=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Node Not Found | Stackly SaaS Cloud Platform" />

    <title>Node Not Found | Stackly SaaS Cloud Platform</title>

    <link rel="icon" type="image/webp" href="assets/top-logo.webp" />

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <link rel="stylesheet" href="style.css" />
    <style>
      .error-title-anim {
        animation: floatError 4s ease-in-out infinite;
        text-shadow: 0 0 20px rgba(var(--primary-rgb), 0.5);
      }
      .error-subtitle-anim {
        animation: pulseText 3s infinite alternate;
      }
      .error-desc-anim {
        animation: fadeInUp 1.5s ease-out;
      }
      .error-btns-anim {
        animation: fadeInUp 2s ease-out;
      }
      @keyframes floatError {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-20px) scale(1.05); text-shadow: 0 0 40px rgba(var(--primary-rgb), 0.8); }
      }
      @keyframes pulseText {
        0% { opacity: 0.8; transform: scale(0.98); }
        100% { opacity: 1; transform: scale(1.02); }
      }
      @keyframes fadeInUp {
        0% { opacity: 0; transform: translateY(30px); }
        100% { opacity: 1; transform: translateY(0); }
      }
      .btn-go-back {
        background: rgba(255, 255, 255, 0.05) !important;
        border: 1px solid rgba(250, 204, 21, 0.3) !important;
        transition: all 0.3s ease;
      }
      .btn-go-back:hover {
        background: rgba(250, 204, 21, 0.15) !important;
        border-color: #facc15 !important;
        transform: translateY(-3px);
        box-shadow: 0 10px 20px rgba(250, 204, 21, 0.2);
      }

      /* Animated Background Shapes */
      .bg-shape {
        position: absolute;
        border-radius: 50%;
        filter: blur(100px);
        z-index: 0;
        animation: floatShape 12s infinite alternate ease-in-out;
        pointer-events: none;
      }
      .shape-1 {
        width: 40vw;
        height: 40vw;
        background: rgba(250, 204, 21, 0.15);
        top: -10%;
        left: -10%;
      }
      .shape-2 {
        width: 45vw;
        height: 45vw;
        background: rgba(18, 193, 135, 0.12);
        bottom: -20%;
        right: -10%;
        animation-delay: -4s;
      }
      .shape-3 {
        width: 35vw;
        height: 35vw;
        background: rgba(59, 130, 246, 0.15);
        top: 30%;
        left: 40%;
        animation-delay: -8s;
      }
      @keyframes floatShape {
        0% { transform: translate(0, 0) scale(1); }
        33% { transform: translate(50px, -50px) scale(1.1); }
        66% { transform: translate(-30px, 40px) scale(0.9); }
        100% { transform: translate(40px, 20px) scale(1.05); }
      }
    </style>
  </head>

  <body>
    
    <div class="custom-cursor-dot"></div>
    <div class="custom-cursor-ring"></div>

    <div class="preloader" id="preloader" aria-hidden="true">
      <div class="preloader-inner">
        <div class="preloader-rings">
          <span class="preloader-ring preloader-ring-1"></span>
          <span class="preloader-ring preloader-ring-2"></span>
          <span class="preloader-ring preloader-ring-3"></span>
          <div class="preloader-logo-wrap">
            <img src="assets/logo.webp" alt="Stackly" class="preloader-logo" />
          </div>
        </div>
        <div class="preloader-progress" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
          <span class="preloader-progress-bar"></span>
        </div>
        <div class="preloader-dots" aria-hidden="true">
          <span></span><span></span><span></span>
        </div>
      </div>
    </div>

    <div class="back-to-top-wrapper">
      <button id="back_to_top" type="button" class="back-to-top-btn" aria-label="Back to top">
        <svg class="back-to-top-progress" viewBox="0 0 56 56" aria-hidden="true">
          <circle class="back-to-top-track" cx="28" cy="28" r="24"></circle>
          <circle class="back-to-top-bar" cx="28" cy="28" r="24"></circle>
        </svg>
        <span class="back_to_top_icon"><i class="fas fa-arrow-up"></i></span>
      </button>
    </div>

    <main>
      <section class="page-hero page-hero-bg" style="--page-hero-bg: url('https://images.unsplash.com/photo-1550751827-4bd374c873da?auto=format&fit=crop&w=1920&q=80'); min-height: 85vh; display: flex; align-items: center; position: relative; overflow: hidden;">

        <div class="bg-shape shape-1"></div>
        <div class="bg-shape shape-2"></div>
        <div class="bg-shape shape-3"></div>

        <div class="container" style="position: relative; z-index: 2;">
          <div style="max-width: 600px; margin: 0 auto; text-align: center;">
            <div class="error-title-anim" style="font-size: 8rem; font-family: var(--font-display); font-weight: 700; line-height: 1; color: var(--primary); margin-bottom: 24px; display: inline-block;">
              404
            </div>
            <h2 class="error-subtitle-anim" style="font-size: 2.25rem; margin-bottom: 16px; font-family: var(--font-display); color: var(--text-on-dark);">SaaS Page Not Found</h2>
            <p class="error-desc-anim" style="color: var(--text-body-dark); font-size: 1.05rem; margin-bottom: 40px; line-height: 1.7;">
              The cloud dashboard route you requested is not available. Return to the Stackly SaaS platform home.
            </p>
            <div class="error-btns-anim" style="display: flex; gap: 16px; justify-content: center; flex-wrap: wrap;">
              <a href="index.html" class="tj-primary-btn btn-simple">
                <span class="btn-text">Back to Home</span>
                <span class="btn-icon"><i class="fas fa-home"></i></span>
              </a>
              <a href="javascript:history.back()" class="tj-primary-btn btn-simple btn-go-back">
                <span class="btn-text" style="color: #facc15;">Go Back</span>
                <span class="btn-icon" style="background: rgba(250, 204, 21, 0.2);"><i class="fas fa-arrow-left" style="color: #facc15;"></i></span>
              </a>
            </div>          </div>
        </div>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="main.js"></script>
  </body>
</html>
